services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: videoapp-api
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "5173"
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs

  caddy:
    image: caddy:2
    container_name: videoapp-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_UPSTREAM: api:5173
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
