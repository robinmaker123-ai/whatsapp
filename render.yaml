services:
  - type: web
    name: videoapp-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/src/server.js
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false
      - key: WEBSITE_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: PHONE_HASH_SECRET
        sync: false
      - key: DOWNLOAD_ADMIN_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: WEBSITE_DOMAIN
        sync: false
      - key: API_DOMAIN
        sync: false
      - key: TRUST_PROXY
        value: true
      - key: ENABLE_DEV_OTP_PREVIEW
        value: false
      - key: ALLOW_IN_MEMORY_MONGO
        value: false
